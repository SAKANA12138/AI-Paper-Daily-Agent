name: 💎 Elite Paper Daily Bot

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 设置总超时 15 分钟，防止脚本卡死浪费 Actions 额度
    timeout-minutes: 15 

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安装依赖包
        run: |
          python -m pip install --upgrade pip
          # 确保 requirements.txt 包含 langchain-google-genai 和 requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🚀 运行 AI 论文分析 (带自动重试)
        # 💡 这里使用了 retry action：如果脚本出错，它会等待一段时间后重新运行
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 11     # 单次运行略大于脚本内部的 10 分钟限时
          max_attempts: 3         # 脚本如果完全失败，最多重启 3 次
          retry_wait_seconds: 60  # 失败后等 1 分钟再试（避开严重的 API 封锁）
          command: python main.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: 💾 保存记录与报告 (安全提交)
        if: always() # 即使之前步骤失败，也要尝试保存已有的进度记录
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          git add data/elite_processed_ids.txt reports/ || true
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📝 Auto-update paper history and reports"
            # 使用简单的 pull --rebase 策略，更稳健
            git pull --rebase origin main
            git push origin main
          fi

      - name: 🔔 创建 GitHub Issue (手机提醒)
        # 只有生成了 REPORT_CONTENT.md 且当前是成功状态时才创建
        if: success() 
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "REPORT_CONTENT.md" ]; then
            DATE_STR=$(date +'%Y-%m-%d')
            # 直接使用内置的 gh 命令
            gh issue create --title "💎 顶级 AI 论文日报 ($DATE_STR)" --body-file REPORT_CONTENT.md
          else
            echo "没有生成新报告，跳过 Issue 推送。"
          fi
