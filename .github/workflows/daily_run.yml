name: 💎 Elite Paper Daily Bot

# 触发条件：每天定时运行 + 允许手动点击运行
on:
  schedule:
    # GitHub 使用 UTC 时间。
    # 如果你在美国西海岸 (PST), 早上 7 点大概是 UTC 15:00 (夏令时14:00) -> 0 15 * * *
    # 如果你想在北京时间早上 7 点运行，UTC 就是前一天的 23:00 -> 0 23 * * *
    - cron: '0 23 * * *' 
  workflow_dispatch: # 这个允许你在 GitHub 网页上直接点个按钮测试代码！

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许代码把自己产生的新数据 commit 到仓库
      issues: write    # 允许自动创建 Issue（用来当做手机推送）

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 加速依赖安装

      - name: 📦 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 运行 AI 论文爬虫与分析
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python main.py

      - name: 💾 将新记录的黑名单和报告保存到 GitHub 仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/elite_processed_ids.txt reports/
          # 只有当有文件变动时才 commit，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 Auto-update paper history and reports" && git push)

      - name: 🔔 创建 GitHub Issue 进行推送 (手机提醒)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "REPORT_CONTENT.md" ]; then
            DATE_STR=$(date +'%Y-%m-%d')
            # 使用 GitHub CLI 自动发布一个 Issue
            gh issue create --title "💎 顶级 AI 论文日报 ($DATE_STR)" --body-file REPORT_CONTENT.md
          else
            echo "没有生成新报告，跳过 Issue 推送。"
          fi
